; By default, testenvs are configured to:
; - don't skip dist (skipsdist = False)
; - don't skip the package installation (skip_install = False)
; - don't use source installation (usedevelop = False)
; where one of those steps is not necessary for the test,
; we set the associated flag (e.g. for linting we don't need
; the package installation).
[tox]
envlist = bandit, safety, black, black-check, isort, isort-check, check-hash, check-packages, check-dependencies, flake8, mypy, pylint, darglint, check-generate-all-protocols, abci-docstrings, check-abciapp-specs, py{3.10,3.11,3.12,3.13,3.14}-{win,linux,darwin}
; when running locally we don't want to fail for no good reason
skip_missing_interpreters = true
isolated_build = True

[deps-tests]
deps =
    tomte[tests]==0.6.5

[deps-packages]
deps =
    {[deps-tests]deps}
    open-autonomy[all]==0.21.18
    open-aea[all]==2.2.1
    open-aea-cli-ipfs==2.2.1
    toml==0.10.2

[extra-deps]
deps = 
    open-autonomy[all]==0.21.18
; end-extra

[testenv]
basepython = python3
whitelist_externals = /bin/sh
passenv = *
deps = {[deps-packages]deps}
setenv =
    PYTHONHASHSEED=0
    PACKAGES_PATHS = packages
    SERVICE_SPECIFIC_PACKAGES = {env:PACKAGES_PATHS}
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync
    pytest -rfE --doctest-modules tests/ --cov=packages --cov-report=xml --cov-report=term --cov-report=term-missing --cov-config=.coveragerc {posargs}

[testenv:py3.10-linux]
basepython = python3.10
platform=^linux$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.11-linux]
basepython = python3.11
platform=^linux$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.12-linux]
basepython = python3.12
platform=^linux$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.13-linux]
basepython = python3.13
platform=^linux$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.14-linux]
basepython = python3.14
platform=^linux$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.10-win]
basepython = python3.10
platform=^win32$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.11-win]
basepython = python3.11
platform=^win32$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.12-win]
basepython = python3.12
platform=^win32$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.13-win]
basepython = python3.13
platform=^win32$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.14-win]
basepython = python3.14
platform=^win32$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.10-darwin]
basepython = python3.10
platform=^darwin$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.11-darwin]
basepython = python3.11
platform=^darwin$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.12-darwin]
basepython = python3.12
platform=^darwin$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.13-darwin]
basepython = python3.13
platform=^darwin$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:py3.14-darwin]
basepython = python3.14
platform=^darwin$
usedevelop = True
deps = {[testenv]deps}
setenv = {[testenv]setenv}

[testenv:bandit]
skipsdist = True
skip_install = True
deps = 
    tomte[bandit]==0.6.5
commands =
    bandit -s B101 -r {env:SERVICE_SPECIFIC_PACKAGES}
    bandit -s B101 -r scripts

[testenv:black]
skipsdist = True
skip_install = True
deps = 
    tomte[black]==0.6.5
commands = black {env:SERVICE_SPECIFIC_PACKAGES} scripts

[testenv:black-check]
skipsdist = True
skip_install = True
deps = 
    tomte[black]==0.6.5
commands = black --check {env:SERVICE_SPECIFIC_PACKAGES} scripts

[testenv:isort]
skipsdist = True
skip_install = True
deps = 
    tomte[isort]==0.6.5
commands =
    isort {env:SERVICE_SPECIFIC_PACKAGES} --gitignore
    isort scripts/

[testenv:isort-check]
skipsdist = True
skip_install = True
deps = 
    tomte[isort]==0.6.5
commands = isort --check-only --gitignore {env:SERVICE_SPECIFIC_PACKAGES} scripts

[testenv:check-hash]
skipsdist = True
skip_install = True
deps =
    {[testenv]deps}
    open-autonomy[all]==0.21.18
commands = python -m autonomy.cli packages lock --check {posargs}

[testenv:check-packages]
skipsdist = True
skip_install = True
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync
    autonomy check-packages
deps =
    {[testenv]deps}
    open-autonomy[all]==0.21.18
allowlist_externals = autonomy

[testenv:check-dependencies]
skipsdist = True
usedevelop = True
commands =
    autonomy packages sync
    aea-ci check-dependencies --check
deps =
    {[deps-packages]deps}
    open-aea-ci-helpers==2.2.1

[testenv:flake8]
skipsdist = True
skip_install = True
deps = 
    tomte[flake8]==0.6.5
commands =
    flake8 {env:SERVICE_SPECIFIC_PACKAGES}
    flake8 scripts

[testenv:mypy]
skipsdist = True
skip_install = True
deps =
    {[testenv]deps}
    tomte[mypy]==0.6.5
commands =
    mypy {env:SERVICE_SPECIFIC_PACKAGES} --disallow-untyped-defs --config-file tox.ini
    mypy scripts --disallow-untyped-defs --config-file tox.ini

[testenv:pylint]
whitelist_externals = /bin/sh
skipsdist = True
deps =
    {[deps-packages]deps}
    tomte[pylint]==0.6.5
commands = pylint --ignore-patterns=".*_pb2.py" --ignore-paths="^packages/valory/.*$" --disable=C0103,R0801,R0912,C0301,C0201,C0204,C0209,W1203,C0302,R1735,R1729,W0511 {env:SERVICE_SPECIFIC_PACKAGES} scripts

[testenv:safety]
skipsdist = True
skip_install = True
deps = 
    tomte[safety]==0.6.5
commands = safety check -i 37524 -i 38038 -i 37776 -i 38039 -i 39621 -i 40291 -i 39706 -i 41002 -i 51358 -i 51499

[testenv:darglint]
skipsdist = True
skip_install = True
deps = 
    tomte[darglint]==0.6.5
commands = darglint scripts {env:SERVICE_SPECIFIC_PACKAGES}/*

[testenv:check-generate-all-protocols]
skipsdist = True
usedevelop = True
deps =
    tomte[isort]==0.6.5
    tomte[black]==0.6.5
commands = aea generate-all-protocols --check-clean

[testenv:abci-docstrings]
skipsdist = True
usedevelop = True
commands = autonomy analyse docstrings --update

[testenv:check-doc-hashes]
skipsdist = True
skip_install = True
commands =
    aea init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    aea packages sync
    aea-ci check-doc-hashes
deps =
    open-aea[all]==2.2.1
    open-aea-cli-ipfs==2.2.1
    open-aea-ci-helpers==2.2.1
allowlist_externals =
    aea

[testenv:check-abciapp-specs]
skipsdist = True
usedevelop = True
deps =
    {[testenv]deps}
    open-autonomy[all]==0.21.18
commands =  autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
            autonomy packages sync
            autonomy analyse fsm-specs

[testenv:spell-check]
whitelist_externals = mdspell
skipsdist = True
usedevelop = True
deps = 
    tomte[cli]==0.6.5
commands = tomte check-spelling

[testenv:liccheck]
skipsdist = True
usedevelop = True
deps = 
    tomte[liccheck,cli]==0.6.5
    setuptools<=81.0.0
commands =
    tomte freeze-dependencies --output-path {envtmpdir}/requirements.txt
    liccheck -s tox.ini -r {envtmpdir}/requirements.txt -l PARANOID


[flake8]
paths=packages
exclude=.md,
    *_pb2.py,
    *_pb2_grpc.py,
    custom_types.py,

max-line-length = 88
select = B,C,D,E,F,I,W,
ignore = E203,E501,W503,D202,B014,D400,D401,DAR
application-import-names = packages,tests,scripts

# ignore as too restrictive for our needs:
# D400: First line should end with a period
# D401: First line should be in imperative mood
# E501: https://www.flake8rules.com/rules/E501.html (Line too long)
# E203: https://www.flake8rules.com/rules/E203.html (Whitespace)
# W503: https://www.flake8rules.com/rules/W503.html (Line break)
# D202: blank lines
# B014: redundant exception

[isort]
# for black compatibility
profile=black
multi_line_output=3
include_trailing_comma=True
force_grid_wrap=0
use_parentheses=True
ensure_newline_before_comments = True
line_length=88
# custom configurations
order_by_type=False
case_sensitive=True
lines_after_imports=-1
skip =
skip_glob =
known_first_party=autonomy
known_packages=packages
known_local_folder=tests
sections=FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,PACKAGES,LOCALFOLDER

[mypy]
python_version = 3.14
strict_optional = True
exclude=(.*_pb2|.*custom_types)

[mypy-aea.*]
ignore_missing_imports = True

[mypy-requests]
ignore_missing_imports=True

[mypy-yaml]
ignore_missing_imports=True

[mypy-toml]
ignore_missing_imports=True

[mypy-click.*]
ignore_missing_imports=True

[mypy-autonomy.*]
ignore_missing_imports=True

[darglint]
docstring_style=sphinx
strictness=short
ignore_regex=async_act
ignore=DAR401

[pytest]
log_cli = 1
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format=%Y-%m-%d %H:%M:%S
asyncio_mode=strict

markers =
    integration: marks integration tests which require other network services
    e2e: marks end-to-end agent tests

filterwarnings = ignore::DeprecationWarning:aea.*:

; some useful links:
; - https://janelia-flyem.github.io/licenses.html
; - https://dwheeler.com/essays/floss-license-slide.html

; Authorized and unauthorized licenses in LOWER CASE
[Licenses]
authorized_licenses:
    ; aliases for MIT License
    MIT
    MIT license
    https://opensource.org/licenses/MIT
    License :: OSI Approved :: MIT

    ; aliases for BSD License (and variants)
    BSD
    BSD license
    new BSD
    (new) BSD
    new BDS license
    simplified BSD
    3-Clause BSD
    BSD-3-Clause
    BSD 3-Clause
    BSD-2-Clause
    BSD-like
    BSD-2-Clause or Apache-2.0
    BSD, Public Domain

        ; Apache
        Apache Software

    ; aliases for Apache License version 2.0
    Apache 2.0
    Apache-2.0
    Apache-2.0 AND MIT
    Apache License 2.0
    Apache License, Version 2.0
    Apache License Version 2.0
    Apache2
    ASL 2
;   some packages use 'Apache Software' as license string,
;   which is ambiguous. However, 'Apache Software'
;   will likely match with 'Apache 2.0'
    Apache Software
    BSD, Public Domain, Apache
    http://www.apache.org/licenses/LICENSE-2.0

;   PSF (BSD-style)
    Python Software Foundation
    PSF
    PSF-2.0

    ; other permissive licenses
    Historical Permission Notice and Disclaimer (HPND)
    HPND
    ISC
    BSD or Apache License, Version 2.0
    Modified BSD
    Expat
        Public Domain

;   aliases for MPL 2.0
    MPL-2.0
    MPL 2.0
    Mozilla Public License 2.0 (MPL 2.0)

unauthorized_licenses:
;    Section 8 of https://www.mozilla.org/en-US/MPL/2.0/Revision-FAQ/
    MPL 1.1
    MPL-1.1

;   http://www.gnu.org/licenses/license-list.en.html#apache2
    GPLv2
    GPLv2+
    GNU General Public License v2 or later (GPLv2+)

;   LGPL
    LGPL
    GNU Library or Lesser General Public License (LGPL)

;   LGPLv2.1
    LGPLv2.1
    LGPLv2.1+
        GNU Lesser General Public License v2 or later (LGPLv2+)

;   LGPLv3
    GNU Lesser General Public License v3 (LGPLv3)
    LGPLv3

;   GPL v3
    GPL v3
    GPLv3+
        GNU General Public License v3 (GPLv3)

[Authorized Packages]
gym: >=0.15
;filelock is public domain
filelock: >=3.0.12
; regex license is "Apache-2.0 AND CNRI-Python"; CNRI-Python is
; OSI-approved but not in liccheck's built-in list.
regex: >=2020
; open-autonomy wheel metadata reports "Other/Proprietary" due to
; Poetry's license field mapping; actual license is Apache-2.0.
open-autonomy: ==0.21.18
fetchai-ledger-api: >=0.0.1
chardet: >=3.0.4
certifi: >=2019.11.28
;TODO: the following are conflicting packages that need to be sorted
; sub-dep of open-aea-ledger-ethereum-hwi
hidapi: >=0.13.1
; shows in pip freeze but not referenced on code
paramiko: >=3.1.0
; sub-dep of docker-compose
websocket-client: >=0.59.0
